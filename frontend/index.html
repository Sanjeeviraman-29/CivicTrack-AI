<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CivicTrack AI - Login</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-600 to-blue-400 min-h-screen flex items-center justify-center">

<div class="bg-white/20 backdrop-blur-lg p-10 rounded-2xl shadow-2xl w-96">

    <h2 class="text-3xl font-semibold text-white text-center mb-6">
        CivicTrack AI
    </h2>

    <input id="email" type="email" placeholder="Email"
        class="w-full p-3 mb-4 rounded-lg outline-none">

    <input id="password" type="password" placeholder="Password"
        class="w-full p-3 mb-6 rounded-lg outline-none">

    <button onclick="login()"
        class="w-full bg-white text-indigo-600 font-semibold py-3 rounded-lg hover:bg-gray-200 transition">
        Login
    </button>

    <p class="text-white text-sm text-center mt-4">
        Don’t have an account?
        <a href="register.html" class="underline">Register</a>
    </p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
