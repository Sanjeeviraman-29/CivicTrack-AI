<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Role - CivicTrack AI</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-600 to-blue-400 min-h-screen flex items-center justify-center">

<div class="bg-white/20 backdrop-blur-lg p-10 rounded-2xl shadow-2xl w-96 text-center">

    <h2 class="text-3xl font-semibold text-white mb-8">
        Choose Your Role
    </h2>

    <button onclick="selectRole('citizen')"
        class="w-full bg-white text-indigo-600 font-semibold py-3 rounded-lg mb-4 hover:bg-gray-200 transition">
        Citizen
    </button>

    <button onclick="selectRole('admin')"
        class="w-full bg-white text-indigo-600 font-semibold py-3 rounded-lg hover:bg-gray-200 transition">
        Admin
    </button>

</div>

<script>
function selectRole(role) {
    localStorage.setItem("selectedRole", role);
    window.location.href = "login.html";
}
</script>

</body>
</html>
