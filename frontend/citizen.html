<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Citizen Dashboard - CivicTrack AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .tab-btn {
            padding: 12px 24px;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn.active {
            border-bottom-color: #4f46e5;
            color: #4f46e5;
            transform: translateY(-2px);
        }
        .tab-btn:hover {
            color: #4f46e5;
            transform: translateY(-2px);
        }
        #locationMap {
            z-index: 10;
            border: 2px solid #4f46e5;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }
        .leaflet-container {
            background: #f0f0f0;
        }
        .form-group {
            animation: slideIn 0.3s ease forwards;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white p-4 flex justify-between items-center shadow-lg">
    <h1 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-city"></i>CivicTrack AI</h1>
    <div class="flex items-center gap-4">
        <span class="text-sm opacity-90">Citizen Portal</span>
        <button onclick="logout()" class="bg-white text-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-gray-100 transition transform hover:scale-105">
            <i class="fas fa-sign-out-alt mr-2"></i>Logout
        </button>
    </div>
</nav>

<div class="max-w-7xl mx-auto p-8">

    <!-- Tab Navigation -->
    <div class="flex gap-6 mb-8 border-b-2 border-gray-200 pb-2 overflow-x-auto">
        <button class="tab-btn active" onclick="switchTab('report')"><i class="fas fa-triangle-exclamation text-amber-600"></i>Report Issue</button>
        <button class="tab-btn" onclick="switchTab('verify')"><i class="fas fa-check-circle text-green-600"></i>Verify Completions</button>
        <button class="tab-btn" onclick="switchTab('myissues')"><i class="fas fa-list-check text-blue-600"></i>My Issues</button>
    </div>

    <!-- Report Issue Tab -->
    <div id="reportTab" class="tab-content">
        <div class="max-w-3xl">
            <h2 class="text-3xl font-bold mb-8 text-gray-800"><i class="fas fa-exclamation-triangle text-amber-600 mr-3"></i>Report a New Issue</h2>

            <!-- Complaint Form -->
            <div class="bg-white p-8 rounded-xl shadow-lg border-t-4 border-amber-600">

                <div class="form-group mb-6">
                    <label class="block text-gray-800 font-bold mb-2"><i class="fas fa-heading mr-2 text-indigo-600"></i>Issue Title</label>
                    <input id="title" type="text" placeholder="Brief title of the issue..." 
                        class="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent transition">
                </div>

                <div class="form-group mb-6">
                    <label class="block text-gray-800 font-bold mb-2"><i class="fas fa-align-left mr-2 text-indigo-600"></i>Description</label>
                    <textarea id="description" placeholder="Provide detailed description of the issue..."
                        class="w-full p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent transition h-28 resize-none"></textarea>
                </div>

                <div class="form-group mb-6">
                    <label class="block text-gray-800 font-bold mb-3"><i class="fas fa-location-dot mr-2 text-indigo-600"></i>Select Location on Map</label>
                    <div id="locationMap" style="height: 400px; width: 100%;" class="rounded-lg mb-4"></div>
                    
                    <div class="bg-blue-50 p-5 rounded-lg border-2 border-blue-300">
                        <p class="text-sm text-gray-700 mb-3 font-semibold">
                            <i class="fas fa-location-pin text-blue-600 mr-2"></i>Selected Location:
                        </p>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-3 rounded-lg border border-blue-200">
                                <p class="text-xs text-gray-500 font-semibold mb-1">Latitude</p>
                                <p id="selectedLatitude" class="text-lg font-bold text-blue-600">Click on map</p>
                            </div>
                            <div class="bg-white p-3 rounded-lg border border-blue-200">
                                <p class="text-xs text-gray-500 font-semibold mb-1">Longitude</p>
                                <p id="selectedLongitude" class="text-lg font-bold text-blue-600">Click on map</p>
                            </div>
                        </div>
                    </div>

                    <!-- Hidden inputs to store coordinates -->
                    <input id="latitude" type="hidden">
                    <input id="longitude" type="hidden">
                </div>

                <button onclick="createIssue()"
                    class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 text-white px-6 py-4 rounded-lg hover:from-indigo-700 hover:to-indigo-800 font-bold transition transform hover:scale-105 shadow-lg">
                    <i class="fas fa-paper-plane mr-2"></i>Submit Complaint
                </button>

            </div>
        </div>
    </div>

    <!-- Verify Completions Tab -->
    <div id="verifyTab" class="tab-content hidden">
        <h2 class="text-3xl font-bold mb-8 text-gray-800"><i class="fas fa-certificate text-green-600 mr-3"></i>Verify Work Completions</h2>
        
        <div id="verificationContainer" class="grid md:grid-cols-2 gap-6">
            <!-- Verification items will be loaded here -->
        </div>
    </div>

    <!-- My Issues Tab -->
    <div id="myIssuesTab" class="tab-content hidden">
        <h2 class="text-3xl font-bold mb-8 text-gray-800"><i class="fas fa-list-check text-blue-600 mr-3"></i>My Reported Issues</h2>

        <!-- Filter Section -->
        <div class="bg-white p-6 rounded-xl shadow-lg mb-6 border-l-4 border-indigo-600">
            <h3 class="font-bold text-lg mb-4 text-gray-800"><i class="fas fa-funnel mr-2 text-indigo-600"></i>Filter Issues</h3>
            <div class="grid md:grid-cols-3 gap-4">
                <select id="myStatusFilter" class="p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-600 transition cursor-pointer" onchange="filterMyIssues()">
                    <option value="">All Status</option>
                    <option value="Pending">🔴 Pending</option>
                    <option value="In Progress">🟡 In Progress</option>
                    <option value="Resolved">✅ Resolved</option>
                </select>
                
                <select id="mySeverityFilter" class="p-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-600 transition cursor-pointer" onchange="filterMyIssues()">
                    <option value="">All Severity</option>
                    <option value="High">🔴 High</option>
                    <option value="Medium">🟡 Medium</option>
                    <option value="Low">🟢 Low</option>
                </select>

                <button onclick="document.getElementById('myStatusFilter').value=''; document.getElementById('mySeverityFilter').value=''; loadMyIssues();" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 font-semibold transition">
                    <i class="fas fa-redo mr-2"></i>Reset Filters
                </button>
            </div>
        </div>

        <div id="issuesContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>

</div>

<!-- Verification Modal -->
<div id="verificationModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <h2 class="text-2xl font-semibold mb-6">Verify Work Completion</h2>
        
        <div class="mb-6">
            <h3 id="verifyIssueTitle" class="text-xl font-semibold mb-2"></h3>
            <p id="verifyCategory" class="text-gray-600 mb-4"></p>
            
            <div class="bg-gray-100 p-4 rounded-lg mb-4">
                <p><strong>Description:</strong></p>
                <p id="verifyDescription" class="text-gray-700"></p>
            </div>

            <div class="bg-gray-100 p-4 rounded-lg mb-4">
                <p><strong>Resolver's Comments:</strong></p>
                <p id="verifyComments" class="text-gray-700"></p>
            </div>

            <div class="mb-4">
                <p class="font-semibold mb-2">Work Completion Photo:</p>
                <img id="verifyImage" src="" alt="Work completion" class="w-full rounded-lg border border-gray-300 max-h-96 object-contain">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">If Unsatisfactory, provide reason:</label>
                <textarea id="rejectionReason" class="w-full border border-gray-300 rounded-lg p-3 h-20 resize-none" 
                    placeholder="Explain why the work is not acceptable..."></textarea>
            </div>
        </div>

        <div class="flex gap-4">
            <button onclick="approveVerification()" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700">
                ✓ Approve & Mark Resolved
            </button>
            <button onclick="rejectVerification()" class="flex-1 bg-red-600 text-white py-2 rounded-lg font-semibold hover:bg-red-700">
                ✗ Reject & Ask to Redo
            </button>
            <button onclick="closeVerificationModal()" class="flex-1 bg-gray-300 text-gray-800 py-2 rounded-lg font-semibold hover:bg-gray-400">
                Cancel
            </button>
        </div>
    </div>
</div>

<script src="js/citizen.js"></script>
</body>
</html>
