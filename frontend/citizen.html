<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Citizen Dashboard - CivicTrack AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-indigo-600 text-white p-4 flex justify-between">
    <h1 class="text-xl font-semibold">CivicTrack AI</h1>
    <button onclick="logout()" class="bg-white text-indigo-600 px-4 py-1 rounded-lg">
        Logout
    </button>
</nav>

<div class="max-w-6xl mx-auto p-6">

    <h2 class="text-2xl font-semibold mb-6">Report an Issue</h2>

    <!-- Complaint Form -->
    <div class="bg-white p-6 rounded-xl shadow-md mb-10">

        <input id="title" type="text" placeholder="Issue Title"
            class="w-full p-3 border rounded-lg mb-4">

        <textarea id="description" placeholder="Describe the issue"
            class="w-full p-3 border rounded-lg mb-4"></textarea>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <input id="latitude" type="text" placeholder="Latitude"
                class="p-3 border rounded-lg">
            <input id="longitude" type="text" placeholder="Longitude"
                class="p-3 border rounded-lg">
        </div>

        <button onclick="createIssue()"
            class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700">
            Submit Complaint
        </button>

    </div>

    <!-- My Issues Section -->
    <h2 class="text-2xl font-semibold mb-4">My Complaints</h2>

    <div id="issuesContainer" class="grid md:grid-cols-2 gap-6">
    </div>

</div>

<script src="js/citizen.js"></script>
</body>
</html>
