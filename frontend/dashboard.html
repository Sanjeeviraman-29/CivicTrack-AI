<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - CivicTrack AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-indigo-700 text-white p-6">
        <h2 class="text-2xl font-semibold mb-10">CivicTrack AI</h2>

        <ul class="space-y-4">
            <li class="hover:bg-indigo-600 p-2 rounded">Dashboard</li>
            <li class="hover:bg-indigo-600 p-2 rounded">Analytics</li>
            <li class="hover:bg-indigo-600 p-2 rounded">Map</li>
        </ul>

        <button onclick="logout()" 
            class="mt-10 bg-white text-indigo-700 px-4 py-2 rounded-lg w-full">
            Logout
        </button>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8">

        <h1 class="text-3xl font-semibold mb-6">Admin Dashboard</h1>

        <!-- KPI Cards -->
        <div class="grid md:grid-cols-3 gap-6 mb-8">

            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="text-gray-500">Total Issues</h3>
                <p id="totalIssues" class="text-2xl font-semibold">0</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="text-gray-500">Pending Issues</h3>
                <p id="pendingIssues" class="text-2xl font-semibold">0</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="text-gray-500">Resolved Issues</h3>
                <p id="resolvedIssues" class="text-2xl font-semibold">0</p>
            </div>

        </div>

        <!-- Charts -->
        <div class="grid md:grid-cols-2 gap-8">

            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="mb-4 font-semibold">Category Distribution</h3>
                <canvas id="categoryChart"></canvas>
            </div>

            <div class="bg-white p-6 rounded-xl shadow">
                <h3 class="mb-4 font-semibold">Severity Distribution</h3>
                <canvas id="severityChart"></canvas>
            </div>

        </div>

        <!-- Map Section -->
        <div class="mt-10 bg-white p-6 rounded-xl shadow">
            <h3 class="mb-4 font-semibold text-lg">Live Issue Map</h3>
            <div id="map" class="h-96 rounded-lg"></div>
        </div>

        <!-- Issue Management Table -->
        <div class="mt-10 bg-white p-6 rounded-xl shadow">
            <h3 class="mb-4 font-semibold text-lg">Manage Issues</h3>

            <div class="overflow-x-auto">
                <table class="min-w-full border border-gray-200 rounded-lg">
                    <thead class="bg-indigo-600 text-white">
                        <tr>
                            <th class="p-3 text-left">Title</th>
                            <th class="p-3 text-left">Category</th>
                            <th class="p-3 text-left">Severity</th>
                            <th class="p-3 text-left">Status</th>
                            <th class="p-3 text-left">Action</th>
                        </tr>
                    </thead>
                    <tbody id="issueTable" class="bg-white">
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
